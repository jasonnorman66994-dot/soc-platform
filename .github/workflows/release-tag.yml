name: Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (example: v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark GitHub release as pre-release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid version format. Use vMAJOR.MINOR.PATCH (example: v1.2.0)."
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          if git rev-parse "${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ github.event.inputs.version }}"
            exit 1
          fi

      - name: Create and push git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease }}
