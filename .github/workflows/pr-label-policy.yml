name: PR Label Policy

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  label-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const labels = (pr.labels || []).map((l) => l.name);

            const areaLabels = [
              "security", "hardening", "ci", "github-actions", "backend", "api",
              "frontend", "ui", "infra", "ops", "docs"
            ];

            const versionLabels = ["major", "minor", "patch", "fix", "chore"];

            const hasArea = labels.some((l) => areaLabels.includes(l));
            const hasVersion = labels.some((l) => versionLabels.includes(l));

            const missing = [];
            if (!hasArea) {
              missing.push(`one area label (${areaLabels.join(", ")})`);
            }
            if (!hasVersion) {
              missing.push(`one version label (${versionLabels.join(", ")})`);
            }

            core.summary
              .addHeading("PR Label Policy")
              .addRaw(`Current labels: ${labels.length ? labels.join(", ") : "none"}`)
              .addEOL()
              .write();

            if (missing.length) {
              core.setFailed(`Missing required labels: ${missing.join(" and ")}. See .github/LABEL_POLICY.md`);
            }
