name: Nightly Resilience

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resilience:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        shell: bash
        run: |
          if [ -f .env ]; then
            echo ".env already present"
          else
            cp .env.example .env
          fi

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 5
          done
          echo "API failed to become ready"
          exit 1

      - name: Run quick checks
        shell: pwsh
        run: ./scripts/quick-check.ps1

      - name: Run release verify gate
        shell: pwsh
        run: ./scripts/release-verify-ci.ps1

      - name: Run full preflight
        shell: pwsh
        run: ./scripts/preflight-release.ps1

      - name: Capture runtime diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt
          docker compose logs backend > artifacts/backend.log || true
          docker compose logs frontend > artifacts/frontend.log || true
          docker compose logs nginx > artifacts/nginx.log || true
          docker compose logs db > artifacts/db.log || true
          docker compose logs redis > artifacts/redis.log || true

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-resilience-artifacts
          path: artifacts/

      - name: Teardown
        if: always()
        run: docker compose down -v
