---
# SOC Platform Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: soc-platform
  labels:
    name: soc-platform
    pod-security.kubernetes.io/enforce: baseline

---
# Database Secret
apiVersion: v1
kind: Secret
metadata:
  name: soc-secrets
  namespace: soc-platform
type: Opaque
stringData:
  database-url: "postgresql://soc:socpass@postgres:5432/socdb"
  redis-url: "redis://redis:6379/0"
  jwt-secret: "your-jwt-secret-change-in-production"
  stripe-api-key: ""
  slack-webhook-url: ""

---
# Ingress with HTTPS/Let's Encrypt
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soc-platform-ingress
  namespace: soc-platform
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - soc.example.com
    secretName: soc-tls-cert
  rules:
  - host: soc.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: soc-api
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: soc-api
            port:
              number: 8000

---
# Certificate via Let's Encrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: soc-tls-cert
  namespace: soc-platform
spec:
  secretName: soc-tls-cert
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  commonName: soc.example.com
  dnsNames:
  - soc.example.com
  - "*.soc.example.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@soc.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx

---
# Persistent Volume for PostgreSQL
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
  - ReadWriteOnce
  storageClassName: standard
  hostPath:
    path: /data/postgres

---
# Persistent Volume Claim for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: soc-platform
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi

---
# ConfigMap for logging
apiVersion: v1
kind: ConfigMap
metadata:
  name: soc-logging-config
  namespace: soc-platform
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File parsers.conf

    [INPUT]
        Name tail
        Path /var/log/containers/*soc*.log
        Parser docker
        Tag kube.*
        Refresh_Interval 5

    [OUTPUT]
        Name stackdriver
        Match *
        google_service_credentials /var/secrets/google/key.json
        resource k8s_container
        tag_prefix kube.
